<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <section>
        <div class="div-h1">
            <h1>Envio de Curriculo</h1>
        </div>
        <div class="div-button">
            <div class="div-input">
                <input type="text" placeholder="Nome">
                <input type="email" placeholder="Email">
                <input type="tel" placeholder="Telefone">
                <input type="file" id="arquivo" accept="application/pdf">
            </div>
            <button onclick="enviarCurriculo()">Enviar Curriculo</button>
        </div>
        <div class="div-resultado">
            <p id="resultado"></p>
        </div>
        <a href="comprovante.pdf" id="download" download="comprovante" style="display: none;">
            Baixar Comprovante
        </a>
    </section>
    <script src="script.js"></script>
</body>
</html>
